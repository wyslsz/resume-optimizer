<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">

<title>AI 简历优化器 — ¥9.9 智能改写简历</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);min-height:100vh;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto}
.hero{text-align:center;padding:30px 0}
.hero h1{font-size:28px;margin-bottom:8px}
.hero p{font-size:15px;opacity:0.85}
.card{background:#fff;color:#333;border-radius:16px;padding:24px;margin-bottom:16px}
.price{text-align:center;margin-bottom:16px}
.price .now{font-size:36px;font-weight:bold;color:#2c5364}
.price .old{text-decoration:line-through;color:#999;font-size:14px}
.qr{text-align:center;padding:12px 0}
.qr img{width:180px;height:180px}
.qr .amount{font-size:22px;font-weight:bold;color:#07c160;margin:8px 0}
.steps{font-size:13px;color:#555;line-height:2.4;padding:12px;background:#f9f9f9;border-radius:8px;margin:12px 0}
.steps .num{display:inline-block;width:20px;height:20px;background:#2c5364;color:#fff;border-radius:50%;text-align:center;line-height:20px;font-size:11px;margin-right:6px}
.email-box{text-align:center;margin-top:12px}
.email-box a{display:inline-block;background:#07c160;color:#fff;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:bold;font-size:16px}
.email-box .addr{color:#2c5364;font-weight:bold;font-size:15px;margin-top:8px}
.footer{text-align:center;padding:20px;color:rgba(255,255,255,0.6);font-size:12px}

<div class="container">

    <div class="addr">1203122173@qq.com</div>

<div class="footer">
  24小时自动处理 · 1分钟出结果
